<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>シンプルWebARフォトフレーム</title>
  <!-- A-Frame と AR.js の読み込み -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    
    /* 1. フォトフレーム（画面にぴったり固定、タップイベントを通す） */
    #photo-frame {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 10;
      pointer-events: none; /* これがないと後ろのARが操作できなくなります */
      object-fit: contain; /* 画面に収まるように配置。デザインに応じて cover に変更可 */
    }

    /* 2. UIレイヤー（撮影ボタンなど） */
    #ui-container {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%);
      z-index: 20;
    }
    #capture-btn {
      width: 70px; height: 70px;
      border-radius: 50%;
      border: 5px solid #fff;
      background-color: rgba(0, 0, 0, 0.3);
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      cursor: pointer;
    }
    #capture-btn:active { background-color: rgba(255, 255, 255, 0.7); }

    /* 3. 撮影後のプレビュー画面（長押し保存用） */
    #preview-container {
      display: none; /* 初期状態は非表示 */
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.8);
      z-index: 30;
      flex-direction: column; justify-content: center; align-items: center;
    }
    #preview-img { max-width: 90%; max-height: 70%; border: 3px solid white; }
    #close-btn { margin-top: 20px; padding: 10px 20px; background: white; border: none; border-radius: 5px; }
  </style>
</head>
<body>

  <!-- AR空間（カメラ映像を表示するためだけに利用） -->
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <a-entity camera></a-entity>
  </a-scene>

  <!-- フォトフレーム画像（透過PNG） -->
  <img id="photo-frame" src="frame.png" alt="Frame">

  <!-- 撮影ボタン -->
  <div id="ui-container">
    <button id="capture-btn" aria-label="写真を撮影する"></button>
  </div>

  <!-- プレビュー・保存画面 -->
  <div id="preview-container">
    <p style="color: white; margin-bottom: 10px;">画像を長押しして保存してね！</p>
    <img id="preview-img" alt="撮影された写真">
    <button id="close-btn">もう一度撮る</button>
  </div>

  <script>
    const captureBtn = document.getElementById('capture-btn');
    const previewContainer = document.getElementById('preview-container');
    const previewImg = document.getElementById('preview-img');
    const closeBtn = document.getElementById('close-btn');

    captureBtn.addEventListener('click', () => {
      const video = document.querySelector('video');
      const frame = document.getElementById('photo-frame');

      if (!video) {
        alert("カメラ映像の読み込みを待っています...");
        return;
      }

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      // 1. Canvasのサイズをカメラ映像の「生の解像度」に合わせる
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      // 【ステップ1】カメラ映像をそのまま描画
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      // 【ステップ2】フォトフレームの縦横比を保って中央に合成する計算
      // カメラの比率と、フレーム画像本来の比率を計算
      const canvasRatio = canvas.width / canvas.height;
      const frameRatio = frame.naturalWidth / frame.naturalHeight;

      let renderWidth, renderHeight, xOffset, yOffset;

      // 画面の表示（object-fit: contain）と同じように、
      // フレーム全体が必ず写真に収まり、比率を崩さないための計算
      if (canvasRatio > frameRatio) {
        // カメラの方が横に広い場合（または縦が短い場合）
        renderHeight = canvas.height;
        renderWidth = canvas.height * frameRatio;
        xOffset = (canvas.width - renderWidth) / 2;
        yOffset = 0;
      } else {
        // カメラの方が縦に長い場合
        renderWidth = canvas.width;
        renderHeight = canvas.width / frameRatio;
        xOffset = 0;
        yOffset = (canvas.height - renderHeight) / 2;
      }

      // 【ステップ3】比率を保ったサイズ（renderWidth/Height）と、中央に寄せる位置（xOffset/yOffset）を指定して描画
      ctx.drawImage(frame, xOffset, yOffset, renderWidth, renderHeight);

      // 【ステップ4】画像データに変換してプレビュー表示
      const dataUrl = canvas.toDataURL('image/jpeg');
      previewImg.src = dataUrl;
      previewContainer.style.display = 'flex';
    });

    // プレビューを閉じる処理
    closeBtn.addEventListener('click', () => {
      previewContainer.style.display = 'none';
    });
  </script>
</body>
</html>
